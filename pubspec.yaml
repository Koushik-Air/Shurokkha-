name: shurokkha
description: "A safety and SOS emergency application for women's security."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Database & Storage
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.3

  # Location & Maps
  geolocator: ^12.0.0
  google_maps_flutter: ^2.6.0
  http: ^1.2.0

  # Hardware/Sensors
  sensors_plus: ^6.0.0
  record: ^5.2.1
  connectivity_plus: ^6.0.0
  url_launcher: ^6.3.0
  uuid: ^4.5.3
  telephony: ^0.2.0 # Android only for silent SMS
  flutter_contacts: ^1.1.8+1
  google_fonts: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

dependency_overrides:
  record_platform_interface: 1.1.0

flutter:
  uses-material-design: true
  generate: true # Enable generating localization files automatically
